command: ['uvicorn', 'app:app', '--host', '0.0.0.0', '--port', '8000']
env:
  - name: DATABRICKS_WAREHOUSE_ID
    value: '6fe05215efba4694'
  - name: APP_CACHE_SCHEMA
    value: 'dev.ai_pb_gold'
  - name: LLM_ROUTER_MODEL
    value: 'databricks-gpt-5-4-mini'
  - name: LLM_COMPOSER_MODEL
    value: 'databricks-gpt-5-4-mini'
resources:
  - name: sql-warehouse
    sql_warehouse:
      id: '6fe05215efba4694'
      permission: CAN_USE
  - name: llm-serving-endpoint
    serving_endpoint:
      name: 'databricks-gpt-5-4-mini'
      permission: CAN_QUERY
